name: Build Domo Probe UI

on:
  pull_request:
    branches: [ main ]
    paths:
      - "domo-probe-ui/**"
      - ".github/workflows/domo-probe-ui.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build probe APK
        run: gradle -p domo-probe-ui :app:assembleDebug --stacktrace

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp domo-probe-ui/app/build/outputs/apk/debug/app-debug.apk \
            dist/SDA-Domo-Probe-v0.1.3.apk
          sha256sum dist/SDA-Domo-Probe-v0.1.3.apk | tee dist/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SDA-Domo-Probe-v0.1.3
          path: dist/*
          if-no-files-found: error
