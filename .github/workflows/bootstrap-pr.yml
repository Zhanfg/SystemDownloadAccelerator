name: Build Alpha PR

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect bootstrap source
        id: bootstrap
        shell: bash
        run: |
          if [[ -f .bootstrap/project.b64 ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode project archive
        if: steps.bootstrap.outputs.present == 'true'
        run: base64 --decode .bootstrap/project.b64 > /tmp/project.tar.gz

      - name: Verify project archive
        if: steps.bootstrap.outputs.present == 'true'
        run: gzip -tv /tmp/project.tar.gz

      - name: Extract project source
        if: steps.bootstrap.outputs.present == 'true'
        run: |
          tar -xvzf /tmp/project.tar.gz
          rm -rf .bootstrap .ci-retry* .github/workflows/bootstrap.yml

      - name: Normalize Android build toolchain
        shell: bash
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SystemDownloadAccelerator"
          include(":app")
          EOF
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          EOF
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "io.github.zhanfg.sda"
              compileSdk = 35
              buildToolsVersion = "35.0.0"

              defaultConfig {
                  applicationId = "io.github.zhanfg.sda"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "0.1.0-alpha1"
              }

              buildTypes {
                  debug {
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }
                  release {
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              packaging {
                  resources {
                      merges += "META-INF/xposed/*"
                  }
              }

              lint {
                  abortOnError = false
                  checkReleaseBuilds = false
              }
          }

          dependencies {
              compileOnly("io.github.libxposed:api:102.0.0")
          }
          EOF

      - name: Commit expanded source
        if: steps.bootstrap.outputs.present == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement alpha 1 module" || true
          git push origin HEAD:${{ github.head_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APKs
        run: gradle --no-daemon :app:assembleDebug :app:assembleRelease

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/SystemDownloadAccelerator-alpha1-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/SystemDownloadAccelerator-alpha1.apk
          cd dist
          sha256sum *.apk > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-alpha1
          path: dist/*
          if-no-files-found: error
