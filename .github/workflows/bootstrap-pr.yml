name: Build Real API 102 Module

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect bootstrap source
        id: bootstrap
        shell: bash
        run: |
          if [[ -f .bootstrap/project.b64 ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode project archive
        if: steps.bootstrap.outputs.present == 'true'
        run: base64 --decode .bootstrap/project.b64 > /tmp/project.tar.gz

      - name: Verify project archive
        if: steps.bootstrap.outputs.present == 'true'
        run: gzip -tv /tmp/project.tar.gz

      - name: Extract project source
        if: steps.bootstrap.outputs.present == 'true'
        run: |
          tar -xvzf /tmp/project.tar.gz
          rm -rf .bootstrap .ci-retry* .github/workflows/bootstrap.yml

      - name: Apply dynamic system-bar insets
        shell: bash
        run: |
          set -euo pipefail
          SRC="app/src/main/java/io/github/zhanfg/sda"
          mkdir -p "$SRC"
          cat > "$SRC/SystemBarInsets.java" <<'JAVA'
          package io.github.zhanfg.sda;

          import android.graphics.Insets;
          import android.os.Build;
          import android.view.View;
          import android.view.WindowInsets;

          final class SystemBarInsets {
              private SystemBarInsets() {}

              static void apply(View root) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.KITKAT_WATCH) {
                      root.setFitsSystemWindows(true);
                      return;
                  }

                  final int baseLeft = root.getPaddingLeft();
                  final int baseTop = root.getPaddingTop();
                  final int baseRight = root.getPaddingRight();
                  final int baseBottom = root.getPaddingBottom();

                  root.setOnApplyWindowInsetsListener((view, windowInsets) -> {
                      int left;
                      int top;
                      int right;
                      int bottom;

                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                          Insets bars = windowInsets.getInsets(
                                  WindowInsets.Type.systemBars() | WindowInsets.Type.displayCutout());
                          left = bars.left;
                          top = bars.top;
                          right = bars.right;
                          bottom = bars.bottom;
                      } else {
                          left = windowInsets.getSystemWindowInsetLeft();
                          top = windowInsets.getSystemWindowInsetTop();
                          right = windowInsets.getSystemWindowInsetRight();
                          bottom = windowInsets.getSystemWindowInsetBottom();
                      }

                      view.setPadding(
                              baseLeft + left,
                              baseTop + top,
                              baseRight + right,
                              baseBottom + bottom);
                      return windowInsets;
                  });
                  root.requestApplyInsets();
              }
          }
          JAVA

          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('app/src/main/java/io/github/zhanfg/sda')

          main = root / 'MainActivity.java'
          text = main.read_text(encoding='utf-8')
          if 'SystemBarInsets.apply(rootView);' not in text:
              replacement = '''android.view.View rootView = buildRoot();
                  SystemBarInsets.apply(rootView);
                  setContentView(rootView);'''
              text, count = re.subn(
                  r'(?:this\.)?setContentView\((?:this\.)?buildRoot\(\)\);',
                  replacement,
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit('MainActivity setContentView pattern not found')
              main.write_text(text, encoding='utf-8')

          confirm = root / 'DownloadConfirmActivity.java'
          text = confirm.read_text(encoding='utf-8')
          if 'SystemBarInsets.apply(rootView);' not in text:
              pattern = r'(?:this\.)?setContentView\((?:this\.)?build\(([^;]+?)\)\);'
              match = re.search(pattern, text)
              if not match:
                  raise SystemExit('DownloadConfirmActivity setContentView pattern not found')
              arg = match.group(1)
              replacement = f'''android.view.View rootView = build({arg});
                  SystemBarInsets.apply(rootView);
                  setContentView(rootView);'''
              text = re.sub(pattern, replacement, text, count=1)
              confirm.write_text(text, encoding='utf-8')
          PY

      - name: Activate real libxposed API 102 entry
        shell: bash
        run: |
          set -euo pipefail
          ENTRY="app/src/main/java/io/github/zhanfg/sda/xposed/RealDownloadAcceleratorModule.java"
          test -f "$ENTRY"

          META="app/src/main/resources/META-INF/xposed"
          mkdir -p "$META"
          printf '%s\n' 'io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule' > "$META/java_init.list"
          printf '%s\n' 'com.android.providers.downloads' > "$META/scope.list"
          cat > "$META/module.prop" <<'EOF'
          minApiVersion=102
          targetApiVersion=102
          staticScope=false
          autoHotReload=false
          EOF

          cat >> app/proguard-rules.pro <<'EOF'

          # Loaded by literal name from META-INF/xposed/java_init.list.
          -keep class io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule { public *; }
          -keep class io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule$* { *; }
          EOF

      - name: Normalize Android build toolchain
        shell: bash
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SystemDownloadAccelerator"
          include(":app")
          EOF
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          EOF
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "io.github.zhanfg.sda"
              compileSdk = 35
              buildToolsVersion = "35.0.0"

              defaultConfig {
                  applicationId = "io.github.zhanfg.sda"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 3
                  versionName = "0.2.0-alpha2"
              }

              buildTypes {
                  debug {
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }
                  release {
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              packaging {
                  resources {
                      merges += "META-INF/xposed/*"
                  }
              }

              lint {
                  abortOnError = false
                  checkReleaseBuilds = false
              }
          }

          dependencies {
              compileOnly("io.github.libxposed:api:102.0.0")
          }
          EOF

      - name: Commit expanded source
        if: steps.bootstrap.outputs.present == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Expand real API 102 module source" || true
          git push origin HEAD:${{ github.head_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APKs
        run: gradle --no-daemon :app:assembleDebug :app:assembleRelease

      - name: Verify module packaging
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/app-release.apk; do
            test "$(unzip -p "$apk" META-INF/xposed/java_init.list | tr -d '\r\n')" = \
              "io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule"
            unzip -p "$apk" META-INF/xposed/module.prop | grep -qx 'targetApiVersion=102'
            unzip -l "$apk" | grep -q 'classes.dex'
          done

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/SystemDownloadAccelerator-0.2.0-alpha2-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/SystemDownloadAccelerator-0.2.0-alpha2.apk
          cd dist
          sha256sum *.apk > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-0.2.0-alpha2
          path: dist/*
          if-no-files-found: error
