name: Build Alpha 12 First Run Audit

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build and verify Alpha 12
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bash ci/build-alpha12-fixed.sh 2>&1 | tee build-alpha12.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-alpha12-build-log
          path: build-alpha12.log
          if-no-files-found: warn

      - name: Stop after build failure
        if: steps.build.outcome != 'success'
        run: exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-0.3.0-alpha12
          path: dist/*
          if-no-files-found: error
