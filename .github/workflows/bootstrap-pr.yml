name: Build Alpha 7 In-App Confirmation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build and verify Alpha 7
        run: bash ci/build-alpha7.sh

      - uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-0.2.5-alpha7
          path: dist/*
          if-no-files-found: error
