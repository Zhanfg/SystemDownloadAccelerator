name: Build Modern UI and Real History

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Expand bootstrap project
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .bootstrap/project.b64 ]]; then
            base64 --decode .bootstrap/project.b64 > /tmp/project.tar.gz
            gzip -t /tmp/project.tar.gz
            tar -xzf /tmp/project.tar.gz
          fi

      - name: Add system-bar inset helper
        shell: bash
        run: |
          set -euo pipefail
          SRC="app/src/main/java/io/github/zhanfg/sda"
          mkdir -p "$SRC"
          cat > "$SRC/SystemBarInsets.java" <<'JAVA'
          package io.github.zhanfg.sda;

          import android.graphics.Insets;
          import android.os.Build;
          import android.view.View;
          import android.view.WindowInsets;

          final class SystemBarInsets {
              private SystemBarInsets() {}

              static void apply(View root) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.KITKAT_WATCH) {
                      root.setFitsSystemWindows(true);
                      return;
                  }
                  final int baseLeft = root.getPaddingLeft();
                  final int baseTop = root.getPaddingTop();
                  final int baseRight = root.getPaddingRight();
                  final int baseBottom = root.getPaddingBottom();
                  root.setOnApplyWindowInsetsListener((view, insets) -> {
                      int left;
                      int top;
                      int right;
                      int bottom;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                          Insets bars = insets.getInsets(
                                  WindowInsets.Type.systemBars() | WindowInsets.Type.displayCutout());
                          left = bars.left;
                          top = bars.top;
                          right = bars.right;
                          bottom = bars.bottom;
                      } else {
                          left = insets.getSystemWindowInsetLeft();
                          top = insets.getSystemWindowInsetTop();
                          right = insets.getSystemWindowInsetRight();
                          bottom = insets.getSystemWindowInsetBottom();
                      }
                      view.setPadding(baseLeft + left, baseTop + top,
                              baseRight + right, baseBottom + bottom);
                      return insets;
                  });
                  root.requestApplyInsets();
              }
          }
          JAVA

      - name: Register modern launcher, confirmation and history provider
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path('app/src/main/AndroidManifest.xml')
          xml = manifest.read_text(encoding='utf-8')
          xml = xml.replace('android:name=".MainActivity"',
                            'android:name=".ModernMainActivity"', 1)
          xml = xml.replace('android:name="io.github.zhanfg.sda.MainActivity"',
                            'android:name="io.github.zhanfg.sda.ModernMainActivity"', 1)

          if '.SystemDownloadConfirmActivity' not in xml:
              activity = '''
                  <activity
                      android:name=".SystemDownloadConfirmActivity"
                      android:exported="true"
                      android:excludeFromRecents="true"
                      android:launchMode="singleTop"
                      android:noHistory="true" />
              '''
              xml = xml.replace('</application>', activity + '\n    </application>', 1)

          if 'io.github.zhanfg.sda.history' not in xml:
              provider = '''
                  <provider
                      android:name=".HistoryProvider"
                      android:authorities="io.github.zhanfg.sda.history"
                      android:exported="true" />
              '''
              xml = xml.replace('</application>', provider + '\n    </application>', 1)

          manifest.write_text(xml, encoding='utf-8')

          central = Path('app/src/main/java/io/github/zhanfg/sda/xposed/SystemDownloadConfirmationModule.java')
          text = central.read_text(encoding='utf-8')
          old = '''        void resume() throws Exception {
                      ContentValues values = new ContentValues();
                      values.put("control", 0);
                      values.put("status", 190);
                      update.invoke(provider, uri, values, null, null);
                  }'''
          new = '''        void resume() throws Exception {
                      ContentValues values = new ContentValues();
                      values.put("control", 0);
                      update.invoke(provider, uri, values, null, null);
                      ContentProvider contentProvider = (ContentProvider) provider;
                      Context context = contentProvider.getContext();
                      if (context != null) {
                          context.getContentResolver().notifyChange(uri, null);
                          Intent wakeup = new Intent("android.intent.action.DOWNLOAD_WAKEUP");
                          wakeup.setPackage(TARGET_PACKAGE);
                          context.sendBroadcast(wakeup);
                      }
                  }'''
          if old in text:
              text = text.replace(old, new, 1)
          else:
              text = text.replace('values.put("status", 190);\n', '')
          central.write_text(text, encoding='utf-8')
          PY

      - name: Configure API 102 module metadata
        shell: bash
        run: |
          set -euo pipefail
          test -f app/src/main/java/io/github/zhanfg/sda/ModernMainActivity.java
          test -f app/src/main/java/io/github/zhanfg/sda/HistoryProvider.java
          test -f app/src/main/java/io/github/zhanfg/sda/SystemDownloadConfirmActivity.java
          test -f app/src/main/java/io/github/zhanfg/sda/xposed/RealDownloadAcceleratorModule.java
          test -f app/src/main/java/io/github/zhanfg/sda/xposed/SystemDownloadConfirmationModule.java
          test -f app/src/main/java/io/github/zhanfg/sda/xposed/HistoryMirrorModule.java

          META="app/src/main/resources/META-INF/xposed"
          mkdir -p "$META"
          cat > "$META/java_init.list" <<'EOF'
          io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule
          io.github.zhanfg.sda.xposed.SystemDownloadConfirmationModule
          io.github.zhanfg.sda.xposed.HistoryMirrorModule
          EOF
          printf '%s\n' 'com.android.providers.downloads' > "$META/scope.list"
          cat > "$META/module.prop" <<'EOF'
          minApiVersion=102
          targetApiVersion=102
          staticScope=false
          autoHotReload=false
          EOF

          cat >> app/proguard-rules.pro <<'EOF'

          -keep class io.github.zhanfg.sda.ModernMainActivity { public *; }
          -keep class io.github.zhanfg.sda.SystemDownloadConfirmActivity { public *; }
          -keep class io.github.zhanfg.sda.HistoryProvider { public *; }
          -keep class io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule { public *; }
          -keep class io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule$* { *; }
          -keep class io.github.zhanfg.sda.xposed.SystemDownloadConfirmationModule { public *; }
          -keep class io.github.zhanfg.sda.xposed.SystemDownloadConfirmationModule$* { *; }
          -keep class io.github.zhanfg.sda.xposed.HistoryMirrorModule { public *; }
          -keep class io.github.zhanfg.sda.xposed.HistoryMirrorModule$* { *; }
          EOF

      - name: Normalize Android build toolchain
        shell: bash
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SystemDownloadAccelerator"
          include(":app")
          EOF
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          EOF
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "io.github.zhanfg.sda"
              compileSdk = 35
              buildToolsVersion = "35.0.0"

              defaultConfig {
                  applicationId = "io.github.zhanfg.sda"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 6
                  versionName = "0.2.3-alpha5"
              }

              buildTypes {
                  debug {
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }
                  release {
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              packaging {
                  resources {
                      merges += "META-INF/xposed/*"
                  }
              }

              lint {
                  abortOnError = false
                  checkReleaseBuilds = false
              }
          }

          dependencies {
              compileOnly("io.github.libxposed:api:102.0.0")
          }
          EOF

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APKs
        id: gradle_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon :app:assembleDebug :app:assembleRelease 2>&1 | tee build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-alpha5-build-log
          path: build.log
          if-no-files-found: warn

      - name: Stop after failed compilation
        if: steps.gradle_build.outcome != 'success'
        run: exit 1

      - name: Verify modern UI, history and API 102 packaging
        shell: bash
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/app-release.apk; do
            unzip -p "$apk" META-INF/xposed/java_init.list | grep -qx \
              'io.github.zhanfg.sda.xposed.RealDownloadAcceleratorModule'
            unzip -p "$apk" META-INF/xposed/java_init.list | grep -qx \
              'io.github.zhanfg.sda.xposed.SystemDownloadConfirmationModule'
            unzip -p "$apk" META-INF/xposed/java_init.list | grep -qx \
              'io.github.zhanfg.sda.xposed.HistoryMirrorModule'
            unzip -p "$apk" META-INF/xposed/scope.list | grep -qx \
              'com.android.providers.downloads'
            unzip -p "$apk" META-INF/xposed/module.prop | grep -qx \
              'targetApiVersion=102'
          done

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/SystemDownloadAccelerator-0.2.3-alpha5-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/SystemDownloadAccelerator-0.2.3-alpha5.apk
          cd dist
          sha256sum *.apk > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-0.2.3-alpha5
          path: dist/*
          if-no-files-found: error
