name: Build Alpha 12 Integrated Diagnostics

on:
  push:
    branches:
      - feature/alpha12-integrated-diagnostics
  pull_request:
    branches:
      - alpha/0.1.0
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86.0"
          targets: aarch64-linux-android
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Validate Rust detector
        shell: bash
        run: |
          set -o pipefail
          {
            cargo fmt --manifest-path alpha-diagnostics/Cargo.toml
            cargo clippy --manifest-path alpha-diagnostics/Cargo.toml --all-targets -- -D warnings
            cargo test --manifest-path alpha-diagnostics/Cargo.toml --all-targets
          } 2>&1 | tee rust-validation.log

      - name: Upload Rust validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-alpha12-rust-validation
          path: rust-validation.log
          if-no-files-found: ignore

      - name: Validate module scripts
        shell: bash
        run: |
          bash -n alpha-module/customize.sh
          bash -n alpha-module/post-fs-data.sh
          bash -n alpha-module/service.sh
          bash -n alpha-module/action.sh
          bash -n alpha-module/uninstall.sh
          bash -n ci/build-alpha12-integrated-module.sh

      - name: Build Alpha APK and module ZIP
        shell: bash
        run: |
          chmod +x ci/build-alpha12-integrated-module.sh
          ci/build-alpha12-integrated-module.sh 2>&1 | tee build-alpha12-integrated.log

      - name: Inspect module artifact
        shell: bash
        run: |
          ZIP=dist/SystemDownloadAccelerator-0.3.0-alpha12-module.zip
          test -s "$ZIP"
          unzip -l "$ZIP"
          unzip -Z1 "$ZIP" | grep -qx 'module.prop'
          unzip -Z1 "$ZIP" | grep -qx 'action.sh'
          unzip -Z1 "$ZIP" | grep -qx 'bin/sda-alpha-detect'
          unzip -Z1 "$ZIP" | grep -qx 'apk/SystemDownloadAccelerator.apk'
          test -s dist/checksums.txt
          (cd dist && sha256sum -c checksums.txt)

      - uses: actions/upload-artifact@v4
        with:
          name: SystemDownloadAccelerator-0.3.0-alpha12-integrated-diagnostics
          path: |
            dist/SystemDownloadAccelerator-0.3.0-alpha12-module.zip
            dist/SystemDownloadAccelerator-0.3.0-alpha12.apk
            dist/SystemDownloadAccelerator-0.3.0-alpha12-debug.apk
            dist/checksums.txt
            build-alpha12-integrated.log
          if-no-files-found: error
