name: Build SDA Domo Probe

on:
  workflow_dispatch:
  push:
    branches:
      - feature/domo-lsp-probe-v1
    paths:
      - 'domo-probe/**'
      - '.github/workflows/build-domo-probe.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle -p domo-probe :app:assembleDebug --stacktrace

      - name: Verify APK
        run: |
          test -f domo-probe/app/build/outputs/apk/debug/app-debug.apk
          sha256sum domo-probe/app/build/outputs/apk/debug/app-debug.apk
          unzip -l domo-probe/app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/xposed_init|classes.dex|AndroidManifest.xml'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SDA-Domo-Probe-v0.1.0
          path: domo-probe/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
